name: Upload ClickHouse Backup Secrets to Vault

on:
  workflow_dispatch  

permissions:
  id-token: write
  contents: read

jobs:
  upload-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: ai-feed-recommendation-system-write-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          exportToken: true

      - name: Install Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault

      - name: Upload S3 credentials to Vault
        env:
          VAULT_ADDR: https://vault.yral.com
          S3_ACCESS_KEY_ID: ${{ secrets.CH_BACKUP_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.CH_BACKUP_S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.CH_BACKUP_S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.CH_BACKUP_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.CH_BACKUP_S3_REGION }}
        run: |
          vault kv put secret/ai-feed-recommendation-system/CH_BACKUP_S3_ACCESS_KEY_ID value="$S3_ACCESS_KEY_ID"
          vault kv put secret/ai-feed-recommendation-system/CH_BACKUP_S3_SECRET_ACCESS_KEY value="$S3_SECRET_ACCESS_KEY"
          vault kv put secret/ai-feed-recommendation-system/CH_BACKUP_S3_BUCKET value="$S3_BUCKET"
          vault kv put secret/ai-feed-recommendation-system/CH_BACKUP_S3_ENDPOINT value="$S3_ENDPOINT"
          vault kv put secret/ai-feed-recommendation-system/CH_BACKUP_S3_REGION value="$S3_REGION"
