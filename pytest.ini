[pytest]
# Test discovery paths
testpaths = tests/unit tests/integration

# Python path configuration - active deploy path is src + tests only
pythonpath = src tests

# Asyncio mode - auto-detect async tests
asyncio_mode = auto

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short

# Markers for test categorization
markers =
    unit: Pure unit tests without external dependencies
    integration: Tests requiring real Redis connection

# Minimum pytest version
minversion = 7.0
