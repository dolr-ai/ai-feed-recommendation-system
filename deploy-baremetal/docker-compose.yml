services:
  app:
    image: ${APP_IMAGE:-ghcr.io/dolr-ai/ai-feed-recommendation-system}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging:
      driver: journald
      options:
        tag: recsys-app
    environment:
      PYTHONUNBUFFERED: "1"
      INFLUENCER_FEED_CONFIG_FILE: /app/config/influencer_feed.toml
      STORAGE_NAMESPACE: ${STORAGE_NAMESPACE:-prod}
      KVROCKS_HOST: ${KVROCKS_HOST}
      KVROCKS_PORT: ${KVROCKS_PORT}
      KVROCKS_PASSWORD: ${KVROCKS_PASSWORD}
      KVROCKS_TLS_ENABLED: ${KVROCKS_TLS_ENABLED:-false}
      KVROCKS_CLUSTER_ENABLED: ${KVROCKS_CLUSTER_ENABLED:-false}
      KVROCKS_SSL_CA_CERT: ${KVROCKS_SSL_CA_CERT:-}
      KVROCKS_SSL_CLIENT_CERT: ${KVROCKS_SSL_CLIENT_CERT:-}
      KVROCKS_SSL_CLIENT_KEY: ${KVROCKS_SSL_CLIENT_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      FEED_SYNC_RUN_ON_STARTUP: ${FEED_SYNC_RUN_ON_STARTUP:-true}
      DISCOVERY_REFRESH_RUN_ON_STARTUP: ${DISCOVERY_REFRESH_RUN_ON_STARTUP:-false}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-true}
      SENTRY_DEBUG: ${SENTRY_DEBUG:-false}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_SERVER_NAME: ${SENTRY_SERVER_NAME:-}
      SENTRY_SHUTDOWN_TIMEOUT_SEC: ${SENTRY_SHUTDOWN_TIMEOUT_SEC:-5}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
      SENTRY_STARTUP_TEST_MESSAGE: ${SENTRY_STARTUP_TEST_MESSAGE:-}
      SENTRY_VERIFICATION_ENABLED: ${SENTRY_VERIFICATION_ENABLED:-false}
      SENTRY_VERIFICATION_TOKEN: ${SENTRY_VERIFICATION_TOKEN:-}
    ports:
      - "127.0.0.1:${HOST_APP_PORT:-8000}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - recsys-net

networks:
  recsys-net:
    driver: bridge
